
#  ============================================================================
#  规则集配置
#  ============================================================================
rule-providers:
  #  Actually-Nat 规则集
  microsoft:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/Actually-Net/Rules/Rules/Rule-Providers/microsoft.txt
    path: ./ruleset/Actually-Nat/microsoft.yaml
    interval: 86400





  #  Loyalsoldier 规则集
  reject:
    type: http
    behavior: domain
    format: yaml
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    path: ./ruleset/loyalsoldier/reject.yaml
    interval: 86400


#  ============================================================================
#  分流规则
#  ============================================================================
rules:
  #  1、本地直连
  - IP-CIDR,10.0.0.0/8,全局直连,no-resolve
  - IP-CIDR,172.16.0.0/12,全局直连,no-resolve
  - IP-CIDR,192.168.0.0/16,全局直连,no-resolve
  - RULE-SET,applications,全局直连
  - RULE-SET,private,全局直连

  #  2、广告过滤
  - RULE-SET,reject,广告过滤
  
  #  3、自定义规则
  - DOMAIN-SUFFIX,googleapis.cn,节点选择         #  Google 服务
  - DOMAIN-SUFFIX,gstatic.com,节点选择           #  Google 静态资源
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,节点选择   #  Google Play 下载服务
  - DOMAIN-SUFFIX,github.io,节点选择             #  Github Pages
  - DOMAIN,v2rayse.com,节点选择                  #  V2rayse 节点工具
  - DOMAIN-SUFFIX,gs.com,全局直连                #  公司内网
  - DOMAIN,video.qq.com,全局直连                 #  腾讯视频
  - DOMAIN-KEYWORD,squad,全局直连                #  Squad直连

  #  4、精细化分流
  - RULE-SET,ai,AI
  - RULE-SET,youtube,YouTube
  - RULE-SET,netflix,Netflix
  - RULE-SET,tiktok,TikTok
  - RULE-SET,spotify,Spotify
  - RULE-SET,bahamut,动画疯
  - RULE-SET,bilibilihmt,哔哩哔哩港澳台
  
  #  5、服务类
  - RULE-SET,google,谷歌服务
  - RULE-SET,icloud,苹果服务
  - RULE-SET,telegramcidr,Telegram,no-resolve
  - RULE-SET,apple,苹果服务
  
  #  6、代理类
  - RULE-SET,gfw,节点选择
  - RULE-SET,proxy,节点选择
  
  #  7、非中国域名
  - RULE-SET,tld-not-cn,节点选择
  #  8、直连
  - RULE-SET,direct,全局直连
  - RULE-SET,lancidr,全局直连,no-resolve
  - RULE-SET,cncidr,全局直连,no-resolve
  - GEOSITE,CN,全局直连
  - GEOIP,LAN,全局直连,no-resolve
  - GEOIP,CN,全局直连,no-resolve

  #  9、兜底（最后的兜底规则）
  - MATCH,漏网之鱼
