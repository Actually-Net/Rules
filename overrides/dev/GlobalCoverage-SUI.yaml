# ============================================================================
# 代理组配置（暂缺，S-UI面板不允许手写）
# ============================================================================



# ============================================================================
# 分流规则
# ============================================================================
rules:
  #  1、本地直连
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT

  #  2、广告过滤
  - RULE-SET,reject,REJECT
  - RULE-SET,diyreject,REJECT                #  补充拦截

  #  3、游戏
  - RULE-SET,directgame,DIRECT                #  直连游戏
  - RULE-SET,proxygame,Proxy                  #  代理游戏

  #  4、自定义规则
  - DOMAIN-SUFFIX,googleapis.cn,Proxy         #  Google 服务
  - DOMAIN-SUFFIX,gstatic.com,Proxy           #  Google 静态资源
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,Proxy   #  Google Play 下载服务
  - DOMAIN-SUFFIX,github.io,Proxy             #  Github Pages
  - DOMAIN,v2rayse.com,Proxy                  #  V2rayse 节点工具
  - RULE-SET,diydirect,DIRECT                 #  补充直连
  - RULE-SET,diyproxy,Proxy                   #  补充代理
  - RULE-SET,cnmedia,DIRECT                   #  国内媒体

  # 特别预留（公司内网等）
  - DOMAIN-SUFFIX,gs.com,DIRECT
  - DOMAIN,video.qq.com,DIRECT
  
  # Loyalsoldier 规则集
  # 1、本地
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
  # 2、广告过滤
  - RULE-SET,reject,REJECT
  # 3、细化分流（最高优先）
  - RULE-SET,ai,Proxy
  - RULE-SET,youtube,Proxy
  - RULE-SET,netflix,Proxy
  - RULE-SET,tiktok,Proxy
  - RULE-SET,spotify,Proxy
  - RULE-SET,bahamut,Proxy

 #  5、精细化分流
  - RULE-SET,ai,Proxy
  - RULE-SET,youtube,Proxy
  - RULE-SET,netflix,Proxy
  - RULE-SET,tiktok,Proxy
  - RULE-SET,spotify,Proxy
  - RULE-SET,bahamut,Proxy
  - RULE-SET,bilibilihmt,DIRECT
  
  #  6、服务类
  - RULE-SET,google,Proxy
  - RULE-SET,microsoft,DIRECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,telegramcidr,Proxy,no-resolve

  #  7、代理类
  - RULE-SET,gfw,Proxy
  - RULE-SET,proxy,Proxy
  
  #  8、非中国域名
  - RULE-SET,tld-not-cn,Proxy

  #  9、直连
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - GEOSITE,CN,DIRECT
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  #  10、兜底（最后的兜底规则）
  - MATCH,Proxy
